<!-- darkroom/templates/catalog/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}darkroom{% endblock %}</title>
  <link rel="stylesheet" href="/static/safelight.css">
  {% block extra_head %}{% endblock %}
</head>
<body>
<div class="wrap">
  <header>
    <h1 class="wordmark"><a href="/">DARKR<span class="lamp">O</span><span class="lamp">O</span>M</a></h1>
    {% block header_right %}<a class="logout-link" href="/queue">queue</a><a class="logout-link" href="/logout">log out</a>{% endblock %}
  </header>
  {% block content %}{% endblock %}
</div>
<div id="tip"></div>
{% block scripts %}{% endblock %}
</body>
</html>
