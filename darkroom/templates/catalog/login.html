<!-- darkroom/templates/catalog/login.html -->
{% extends "base.html" %}
{% block title %}darkroom — log in{% endblock %}
{% block header_right %}{% endblock %}
{% block content %}
<div class="loginwrap">
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/login">
    <input type="hidden" name="next" value="{{ next }}">
    <input type="password" id="password" name="password" placeholder="password" autofocus required>
    <button type="submit" style="margin-top:12px; width:100%">Log in</button>
  </form>
</div>
{% endblock %}
