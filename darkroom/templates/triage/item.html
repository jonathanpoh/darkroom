<!DOCTYPE html>
<html>
<head><title>darkroom triage — item {{ item.id }}</title></head>
<body>
<h1>Item #{{ item.id }}</h1>
<p>Category: {{ item.category }}</p>
<p>Source: {{ item.source_path }}</p>
<p>Proposed: {{ item.proposed_path }}</p>
<p>Status: {{ item.status }}</p>
{% if thumbnail_url %}
<img src="{{ thumbnail_url }}" alt="thumbnail" style="max-width:600px">
{% endif %}
<form method="post" action="/item/{{ item.id }}/approve">
  <input type="hidden" name="proposed_path" value="">
  <input type="hidden" name="proposed_value" value="">
  <input type="hidden" name="user_notes" value="">
  <button type="submit">Approve</button>
</form>
<form method="post" action="/item/{{ item.id }}/skip">
  <input type="hidden" name="user_notes" value="">
  <button type="submit">Skip</button>
</form>
{% if next_id %}
<a href="/item/{{ next_id }}">Next</a>
{% endif %}
<a href="/queue">Back to queue</a>
</body>
</html>
