[project]
name = "darkroom-ingest"
version = "0.1.0"
description = "Astrophotography pipeline: ASIAir → NAS archive and WBPP session preparation"
requires-python = ">=3.11"
dependencies = [
    "astropy>=5.0",
    "fits-cataloger",
    "pyyaml>=6.0.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["darkroom"]

[tool.uv.sources]
fits-cataloger = { path = "../darkroom-catalog", editable = true }
